# =============================================================================
# conf/environment/local.yaml
# Local development environment settings
# Data source: filesystem (data/raw/)
# =============================================================================
 
# @package _global_
 
environment:
  name: local
  data_source: filesystem        # reads from data/raw/ locally
 
  # GCP — still points to dev project for any manual BQ calls
  gcp_project: cs-cdwp-data-dev2188
  gcp_region: us-central1
 
  # BigQuery
  bq_dataset: DATA_SCNCE_DEV_DATA
  bq_source_table: bigquery-public-data.bbc_news.fulltext
  bq_results_table: news_topic_classifier_results
 
  # Cloud Storage
  gcs_bucket_artifacts: model-artifacts
  gcs_bucket_data: model-data
 
  # Artifact Registry
  artifact_registry_repo: news-topic-classifier
 
  # Vertex AI
  vertex_ai_sa: vertex-ai-sa
 
  # Local paths
  local_data_path: data/
  local_model_path: models/
  local_sample_size: 1000
 
# MLflow — local tracking
mlflow:
  tracking_uri: mlruns