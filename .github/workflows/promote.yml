name: Promote Image

# Manually triggered from the main branch only.
# Copies the validated dev images to prd Artifact Registry, then
# automatically dispatches the training pipeline against prd resources.
on:
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  REPO: news-topic-classifier
  SOURCE_PROJECT: cs-cdwp-data-dev2188
  TARGET_PROJECT: cs-cdwp-data-prd2188

jobs:
  promote:
    name: Promote dev -> prd
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write
      actions: write  # required to dispatch run_pipeline.yml

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Install gcrane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz gcrane
          sudo mv gcrane /usr/local/bin/

      - name: Promote base image
        run: |
          gcrane copy \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.SOURCE_PROJECT }}/${{ env.REPO }}/base:latest \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.TARGET_PROJECT }}/${{ env.REPO }}/base:latest

      - name: Promote trainer image
        run: |
          gcrane copy \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.SOURCE_PROJECT }}/${{ env.REPO }}/trainer:latest \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.TARGET_PROJECT }}/${{ env.REPO }}/trainer:latest

      - name: Promote api image
        run: |
          gcrane copy \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.SOURCE_PROJECT }}/${{ env.REPO }}/api:latest \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.TARGET_PROJECT }}/${{ env.REPO }}/api:latest

      - name: Copy base model to prd artifacts bucket
        run: |
          gcloud storage cp -r \
            "gs://cs-cdwp-data-dev2188-model-artifacts/models/base-models/**" \
            gs://cs-cdwp-data-prd2188-model-artifacts/models/base-models/

      - name: Deploy API to Cloud Run (prd)
        id: deploy-api
        run: |
          API_URL=$(gcloud run deploy news-topic-classifier-api \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.TARGET_PROJECT }}/${{ env.REPO }}/api:latest \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.TARGET_PROJECT }} \
            --platform managed \
            --no-allow-unauthenticated \
            --set-env-vars "MODEL_GCS_URI=gs://cs-cdwp-data-prd2188-model-artifacts/models/bert-bbc-finetuned/,GCP_PROJECT=${{ env.TARGET_PROJECT }}" \
            --memory 4Gi \
            --cpu 2 \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 3 \
            --format="value(status.url)")
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Trigger prd training pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run run_pipeline.yml \
            --repo ${{ github.repository }} \
            --ref main \
            --field environment=prd
