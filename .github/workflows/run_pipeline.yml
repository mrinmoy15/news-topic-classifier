name: Run Training Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, pp, prd]
        default: dev

jobs:
  run-pipeline:
    name: Submit pipeline to ${{ inputs.environment }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Install dependencies
        run: pip install -e . -r requirements/base.txt

      - name: Compile & submit pipeline
        run: |
          python pipelines/run_pipeline.py environment=${{ inputs.environment }}
