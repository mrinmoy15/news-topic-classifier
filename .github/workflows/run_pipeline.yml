name: Run Training Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, prd]
        default: dev
  workflow_run:
    workflows: ["Build & Push to Dev"]
    types: [completed]
    branches: [develop]

jobs:
  run-pipeline:
    name: Submit pipeline to ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      id-token: write

    env:
      TARGET_ENV: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Install dependencies
        run: pip install -e . -r requirements/base.txt

      - name: Compile & submit pipeline
        run: |
          python pipelines/run_pipeline.py environment=${{ env.TARGET_ENV }}
