name: Build & Push to Dev

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - "news_topic_classifier/**"
      - "pipelines/**"
      - "docker/**"
      - "requirements/**"
      - "conf/**"
      - "pyproject.toml"
      - "setup.cfg"

env:
  GCP_REGION: us-central1
  GCP_PROJECT: cs-cdwp-data-dev2188
  REGISTRY: us-central1-docker.pkg.dev/cs-cdwp-data-dev2188/news-topic-classifier

jobs:
  build-and-push:
    name: Build & Push Trainer Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    env:
      DOCKER_CONFIG: /tmp/docker-config  # isolated config, prevents gcloud helper auto-detection

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          token_format: access_token  # no service_account — WIF principal has AR writer directly

      - name: Configure Docker for Artifact Registry
        run: |
          mkdir -p $DOCKER_CONFIG
          echo '{"credHelpers":{}}' > $DOCKER_CONFIG/config.json
          echo "${{ steps.auth.outputs.access_token }}" | \
            docker login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev

      - name: Build base image
        run: |
          docker build \
            -f docker/base/Dockerfile \
            -t ${{ env.REGISTRY }}/base:latest \
            -t ${{ env.REGISTRY }}/base:${{ github.sha }} \
            .

      - name: Push base image
        run: |
          docker push ${{ env.REGISTRY }}/base:latest
          docker push ${{ env.REGISTRY }}/base:${{ github.sha }}

      - name: Build trainer image
        run: |
          docker build \
            -f docker/trainer/Dockerfile \
            --build-arg BASE_IMAGE=${{ env.REGISTRY }}/base:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/trainer:latest \
            -t ${{ env.REGISTRY }}/trainer:${{ github.sha }} \
            .

      - name: Push trainer image
        run: |
          docker push ${{ env.REGISTRY }}/trainer:latest
          docker push ${{ env.REGISTRY }}/trainer:${{ github.sha }}
