name: Build & Push to Dev

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - "news_topic_classifier/**"
      - "pipelines/**"
      - "api/**"
      - "dashboard/**"
      - "docker/**"
      - "requirements/**"
      - "conf/**"
      - "pyproject.toml"
      - "setup.cfg"

env:
  GCP_REGION: us-central1
  GCP_PROJECT: cs-cdwp-data-dev2188
  REGISTRY: us-central1-docker.pkg.dev/cs-cdwp-data-dev2188/news-topic-classifier

jobs:
  build-and-push:
    name: Build & Push Trainer Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    env:
      DOCKER_CONFIG: /tmp/docker-config  # isolated config, prevents gcloud helper auto-detection

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Configure Docker for Artifact Registry
        run: |
          mkdir -p $DOCKER_CONFIG
          AUTH=$(printf "oauth2accesstoken:%s" "${{ steps.auth.outputs.access_token }}" | base64 -w 0)
          printf '{"auths":{"us-central1-docker.pkg.dev":{"auth":"%s"}}}\n' "$AUTH" > $DOCKER_CONFIG/config.json

      - name: Build base image
        run: |
          docker build \
            -f docker/base/Dockerfile \
            -t ${{ env.REGISTRY }}/base:latest \
            -t ${{ env.REGISTRY }}/base:${{ github.sha }} \
            .

      - name: Push base image
        run: |
          docker push ${{ env.REGISTRY }}/base:latest
          docker push ${{ env.REGISTRY }}/base:${{ github.sha }}

      - name: Build trainer image
        run: |
          docker build \
            -f docker/trainer/Dockerfile \
            --build-arg BASE_IMAGE=${{ env.REGISTRY }}/base:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/trainer:latest \
            -t ${{ env.REGISTRY }}/trainer:${{ github.sha }} \
            .

      - name: Push trainer image
        run: |
          docker push ${{ env.REGISTRY }}/trainer:latest
          docker push ${{ env.REGISTRY }}/trainer:${{ github.sha }}

      - name: Build api image
        run: |
          docker build \
            -f api/Dockerfile \
            --build-arg BASE_IMAGE=${{ env.REGISTRY }}/base:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/api:latest \
            -t ${{ env.REGISTRY }}/api:${{ github.sha }} \
            .

      - name: Push api image
        run: |
          docker push ${{ env.REGISTRY }}/api:latest
          docker push ${{ env.REGISTRY }}/api:${{ github.sha }}

      - name: Build dashboard image
        run: |
          docker build \
            -f dashboard/Dockerfile \
            -t ${{ env.REGISTRY }}/dashboard:latest \
            -t ${{ env.REGISTRY }}/dashboard:${{ github.sha }} \
            .

      - name: Push dashboard image
        run: |
          docker push ${{ env.REGISTRY }}/dashboard:latest
          docker push ${{ env.REGISTRY }}/dashboard:${{ github.sha }}
