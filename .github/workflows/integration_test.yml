name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Test tier to run"
        required: true
        default: "data-pipeline"
        type: choice
        options:
          - data-pipeline   # extract + preprocess only (~3 min)
          - full-pipeline   # includes train, predict, report (~25 min)
  push:
    branches:
      - main
    paths:
      - "news_topic_classifier/**"
      - "tests/integration/**"
      - "requirements/**"

env:
  GCP_PROJECT: cs-cdwp-data-dev2188
  GCP_REGION:  us-central1

jobs:
  integration-tests:
    name: Integration Tests (${{ github.event.inputs.tier || 'data-pipeline' }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e . -r requirements/base.txt -r requirements/test.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Run data-pipeline integration tests
        if: ${{ github.event.inputs.tier == 'data-pipeline' || github.event.inputs.tier == '' }}
        env:
          INTEGRATION_TESTS: "true"
          MLFLOW_TRACKING_URI: "https://mlflow-tracking-server-eeh43tst7q-uc.a.run.app"
        run: |
          pytest tests/integration/ \
            -m "integration and not slow" \
            -v --no-cov \
            --timeout=300

      - name: Run full-pipeline integration tests (including training)
        if: ${{ github.event.inputs.tier == 'full-pipeline' }}
        env:
          INTEGRATION_TESTS: "true"
          MLFLOW_TRACKING_URI: "https://mlflow-tracking-server-eeh43tst7q-uc.a.run.app"
        run: |
          pytest tests/integration/ \
            -m integration \
            -v --no-cov \
            --timeout=1800
